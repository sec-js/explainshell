# Source of truth for the app config; `doctl apps update --spec` does a full replace.
name: explainshell
region: nyc
domains:
  - domain: explainshell.com
    type: PRIMARY
services:
  - name: web
    dockerfile_path: prod/docker/Dockerfile
    source_dir: /
    log_destinations:
      - name: betterstack
        logtail:
          token: ${LOGTAIL_TOKEN}
    github:
      repo: idank/explainshell
      branch: master
      # CI deploys pin DB_NAME from the db-latest release; auto-deploy would skip that.
      deploy_on_push: false
    http_port: 8080
    instance_count: 2
    # Cheapest slug that allows instance_count > 1.
    instance_size_slug: apps-s-1vcpu-1gb
    health_check:
      http_path: /health
      initial_delay_seconds: 60
      period_seconds: 10
      timeout_seconds: 10
      failure_threshold: 5
    envs:
      - key: DB_PATH
        value: /opt/webapp/explainshell.db
        scope: RUN_TIME
      - key: HOST_IP
        value: 0.0.0.0
        scope: RUN_TIME
      - key: DEBUG
        value: "false"
        scope: RUN_TIME
      - key: PORT
        value: "8080"
        scope: RUN_TIME
      # Build args, rendered by envsubst in CI.
      - key: DB_NAME
        value: ${DB_NAME}
        scope: BUILD_TIME
      - key: GIT_SHA
        value: ${GIT_SHA}
        scope: BUILD_TIME
